openapi: 3.0.3
info:
  title: Student Evaluation System API
  version: 1.0.0
  description: Outcome-based assessment system for academic programs
paths:
  /api/core/courses/:
    get:
      operationId: core_courses_list
      description: CRUD operations for courses.
      parameters:
      - in: query
        name: department
        schema:
          type: integer
        description: Filter courses by department ID
      - in: query
        name: instructor
        schema:
          type: integer
        description: Filter courses by instructor ID
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: term
        schema:
          type: integer
        description: Filter courses by term ID
      tags:
      - core
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCourseList'
          description: ''
    post:
      operationId: core_courses_create
      description: CRUD operations for courses.
      tags:
      - core
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Course'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Course'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Course'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
          description: ''
  /api/core/courses/{id}/:
    get:
      operationId: core_courses_retrieve
      description: CRUD operations for courses.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Course.
        required: true
      tags:
      - core
      security:
      - jwtAuth: []
      - cookieAuth: []
