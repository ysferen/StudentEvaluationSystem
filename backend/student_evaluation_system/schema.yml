components:
  schemas:
    Assessment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        course:
          type: string
          readOnly: true
        date:
          type: string
          format: date
        total_score:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        weight:
          type: number
          format: double
          maximum: 1.0
          minimum: 0.0
          description: 0.0 to 1.0
        lo_mappings:
          type: array
          items:
            $ref: '#/components/schemas/AssessmentLearningOutcomeMapping'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - course
      - created_at
      - date
      - id
      - lo_mappings
      - name
      - weight
    AssessmentCreate:
      type: object
      description: For creating/updating assessments
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        course:
          type: integer
        date:
          type: string
          format: date
        total_score:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        weight:
          type: number
          format: double
          maximum: 1.0
          minimum: 0.0
          description: 0.0 to 1.0
        assessment_type:
          $ref: '#/components/schemas/AssessmentTypeEnum'
      required:
      - course
      - date
      - id
      - name
      - weight
    AssessmentLearningOutcomeMapping:
      type: object
      description: Nested inside AssessmentSerializer
      properties:
        id:
          type: integer
          readOnly: true
        learning_outcome:
          allOf:
          - $ref: '#/components/schemas/EvaluationLearningOutcome'
          readOnly: true
        learning_outcome_id:
          type: integer
          writeOnly: true
        weight:
          type: number
          format: double
          maximum: 1.0
          minimum: 0.0
          description: 0.0 to 1.0
      required:
      - id
      - learning_outcome
      - learning_outcome_id
      - weight
    AssessmentTypeEnum:
      enum:
      - midterm
      - final
      - homework
      - project
      - quiz
      - attendance
      - other
      type: string
      description: |-
        * `midterm` - Midterm
        * `final` - Final Exam
        * `homework` - Homework
        * `project` - Project
        * `quiz` - Quiz
        * `attendance` - Attendance
        * `other` - Other
    CoreLearningOutcome:
      type: object
      description: Renamed to avoid conflicts with evaluation app
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 10
        description:
          type: string
        course:
          allOf:
          - $ref: '#/components/schemas/Course'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - course
      - created_at
      - description
      - id
    Course:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 10
        name:
          type: string
          maxLength: 255
        credits:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        program:
          allOf:
          - $ref: '#/components/schemas/Program'
          readOnly: true
        term:
          allOf:
          - $ref: '#/components/schemas/Term'
          readOnly: true
        instructors:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Get instructor details including name, surname, and title.
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - id
      - instructors
      - name
      - program
      - term
    CourseEnrollment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        student:
          type: string
          readOnly: true
        course:
          allOf:
          - $ref: '#/components/schemas/Course'
          readOnly: true
        enrolled_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - course
      - enrolled_at
      - id
      - student
    CustomUser:
      type: object
      description: Full user serializer with all fields.
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        role:
          $ref: '#/components/schemas/RoleEnum'
        department:
          type: string
          readOnly: true
        department_id:
          type: integer
          writeOnly: true
          nullable: true
        university:
          type: string
          readOnly: true
        university_id:
          type: integer
          writeOnly: true
          nullable: true
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        is_staff:
          type: boolean
          title: Staff status
          description: Designates whether the user can log into this admin site.
        date_joined:
          type: string
          format: date-time
          readOnly: true
      required:
      - date_joined
      - department
      - id
      - university
      - username
    DegreeLevel:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
      required:
      - id
      - name
    Department:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        code:
          type: string
          maxLength: 10
        university:
          type: string
          readOnly: true
      required:
      - code
      - id
      - name
      - university
    EvaluationLearningOutcome:
      type: object
      description: Learning Outcome serializer for evaluation app to avoid conflicts
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 10
        description:
          type: string
        course:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - course
      - created_at
      - description
      - id
    FileImportResponse:
      type: object
      properties:
        message:
          type: string
        results:
          type: object
          additionalProperties: {}
      required:
      - message
      - results
    FileValidationResponse:
      type: object
      properties:
        message:
          type: string
        available_sheets:
          type: array
          items:
            type: string
        file_info:
          type: object
          additionalProperties: {}
      required:
      - available_sheets
      - file_info
      - message
    InstructorProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        user_id:
          type: integer
          writeOnly: true
        title:
          type: string
          maxLength: 100
      required:
      - id
      - user
      - user_id
    LearningOutcomeProgramOutcomeMapping:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        course:
          type: integer
        learning_outcome:
          allOf:
          - $ref: '#/components/schemas/CoreLearningOutcome'
          readOnly: true
        program_outcome:
          allOf:
          - $ref: '#/components/schemas/ProgramOutcome'
          readOnly: true
        weight:
          type: number
          format: double
          maximum: 1.0
          minimum: 0.0
          description: 0.0 to 1.0
      required:
      - course
      - id
      - learning_outcome
      - program_outcome
      - weight
