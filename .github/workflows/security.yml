name: Security Scan

on:
  push:
    branches: [main, dev, 'feature/**']
  pull_request:
    branches: [main, dev]

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          working-directory: backend
          enable-cache: true
      - name: Install dependencies
        working-directory: backend
        run: uv sync --locked --dev
      - name: Run Bandit
        working-directory: backend
        run: uv run bandit -c pyproject.toml -r student_evaluation_system/
