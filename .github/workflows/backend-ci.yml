name: Backend CI

on:
  push:
    branches: [main, dev, 'feature/**']
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          working-directory: backend
          enable-cache: true
      - name: Install dependencies
        working-directory: backend
        run: uv sync --locked --dev
      - name: Run Ruff
        working-directory: backend/student_evaluation_system
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Django system check
        working-directory: backend
        run: |
          cd student_evaluation_system
          SECRET_KEY="django-insecure-dev-key-for-ci-only-change-in-production" \
          DEBUG=true \
          uv run python manage.py check --deploy

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          working-directory: backend
          enable-cache: true
      - name: Install dependencies
        working-directory: backend
        run: uv sync --locked --dev
      - name: Check for unapplied migrations
        working-directory: backend
        run: |
          cd student_evaluation_system
          uv run python manage.py makemigrations --check --dry-run
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    env:
      DEBUG: 'True'
      SECRET_KEY: 'test-secret-key-do-not-use-in-production'
      ALLOWED_HOSTS: 'localhost,127.0.0.1'
      DATABASE_URL: 'sqlite:///db.sqlite3'
      CORS_ALLOWED_ORIGINS: 'http://localhost:5173'
      CSRF_TRUSTED_ORIGINS: 'http://localhost:5173'
      ANON_THROTTLE_RATE: '10000/day'
      USER_THROTTLE_RATE: '10000/day'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          working-directory: backend
          enable-cache: true
      - name: Install dependencies
        working-directory: backend
        run: uv sync --locked --dev
      - name: Run tests
        working-directory: backend
        run: uv run pytest --cov=student_evaluation_system --cov-report=xml --cov-report=term-missing
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7
