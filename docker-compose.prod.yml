services:
  db:
    image: postgres:15-alpine
    container_name: ses-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-student_evaluation}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Postgres password required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ses-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery_worker:
    image: ghcr.io/ysferen/ses-backend:latest
    container_name: ses-celery-worker
    command: uv run celery --workdir student_evaluation_system -A student_evaluation_system worker -Q celery -c 4 --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      DEBUG: ${DEBUG:-false}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker_ml:
    image: ghcr.io/ysferen/ses-backend:latest
    container_name: ses-celery-worker-ml
    command: uv run celery --workdir student_evaluation_system -A student_evaluation_system worker -Q ml_queue --pool=solo --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      DEBUG: ${DEBUG:-false}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      IS_ML_WORKER: "true"
      OMP_NUM_THREADS: "1"
      TOKENIZERS_PARALLELISM: "false"
      HF_HOME: "/huggingface_cache"
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
    volumes:
      - huggingface_cache:/huggingface_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: ghcr.io/ysferen/ses-backend:latest
    container_name: ses-backend
    command: >
      uv run gunicorn --chdir student_evaluation_system
      student_evaluation_system.wsgi:application
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-4}
      --access-logfile -
      --error-logfile -
      --log-level ${LOG_LEVEL:-warning}
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      DEBUG: ${DEBUG:-false}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:5173}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-false}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/ysferen/ses-frontend:latest
    container_name: ses-frontend
    command: "npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  huggingface_cache:
