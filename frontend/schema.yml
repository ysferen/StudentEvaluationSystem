      - template_learning_outcome
      - weight
    CourseTemplateLOPOMapping:
      type: object
      description: Serializer for CourseTemplateLOPOMapping.
      properties:
        id:
          type: integer
          readOnly: true
        template_learning_outcome:
          type: integer
        program_outcome:
          type: integer
        weight:
          type: number
          format: double
          maximum: 5
          minimum: 0
          description: 0 to 5
      required:
      - id
      - program_outcome
      - template_learning_outcome
      - weight
    CustomUser:
      type: object
      description: Full user serializer with all fields.
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
