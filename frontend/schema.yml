components:
  schemas:
    Assessment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        assessment_type:
          $ref: '#/components/schemas/AssessmentTypeEnum'
        description:
          type: string
          description: Single-sentence description of what this assessment evaluates,
            used for AI weight correlation
        course:
          type: string
          readOnly: true
        date:
          type: string
          format: date
        total_score:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        weight:
          type: number
          format: double
          maximum: 1.0
          minimum: 0.0
          description: 0.0 to 1.0
        lo_mappings:
          type: array
          items:
            $ref: '#/components/schemas/AssessmentLearningOutcomeMapping'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - course
      - created_at
      - id
      - lo_mappings
      - name
    AssessmentCreate:
      type: object
      description: For creating/updating assessments
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        course:
          type: integer
        date:
          type: string
          format: date
        total_score:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        weight:
          type: number
          format: double
          maximum: 1.0
          minimum: 0.0
          description: 0.0 to 1.0
        assessment_type:
          $ref: '#/components/schemas/AssessmentTypeEnum'
        description:
          type: string
          description: Single-sentence description of what this assessment evaluates,
            used for AI weight correlation
      required:
      - course
      - id
      - name
    AssessmentLearningOutcomeMapping:
      type: object
      description: Nested inside AssessmentSerializer
      properties:
        id:
          type: integer
          readOnly: true
        assessment:
          type: integer
          readOnly: true
        assessment_id:
          type: integer
          writeOnly: true
        learning_outcome:
          allOf:
          - $ref: '#/components/schemas/EvaluationLearningOutcome'
          readOnly: true
        learning_outcome_id:
          type: integer
          writeOnly: true
        weight:
          type: number
          format: double
          maximum: 5
          minimum: 0
          description: 0 to 5
      required:
      - assessment
      - id
      - learning_outcome
      - weight
    AssessmentTypeEnum:
      enum:
      - midterm
      - final
      - homework
      - project
      - quiz
      - attendance
      - other
      type: string
      description: |-
        * `midterm` - Midterm
        * `final` - Final Exam
        * `homework` - Homework
        * `project` - Project
        * `quiz` - Quiz
        * `attendance` - Attendance
        * `other` - Other
    BulkAssessmentDescriptionUpdate:
      type: object
      description: |-
        Bulk update assessment descriptions.

        Request body:
            {
                "assessments": [
                    {"id": 1, "description": "Vize sınavı: ..."},
                    {"id": 2, "description": "Final sınavı: ..."},
                ]
            }
      properties:
        assessments:
          type: array
          items:
            type: object
            additionalProperties: {}
          minItems: 1
      required:
      - assessments
    BulkAssessmentLOMapping:
      type: object
      description: Bulk sync payload for assessment-LO mappings.
      properties:
        course_id:
          type: integer
        creates:
          type: array
          items:
            $ref: '#/components/schemas/BulkAssessmentLOMappingItem'
        updates:
          type: array
          items:
            $ref: '#/components/schemas/BulkAssessmentLOMappingItem'
        deletes:
          type: array
          items:
            type: integer
      required:
      - course_id
    BulkAssessmentLOMappingItem:
      type: object
      description: Single item in a bulk sync request.
      properties:
        temp_id:
          type: integer
        id:
          type: integer
        assessment_id:
          type: integer
        learning_outcome_id:
          type: integer
        weight:
          type: number
          format: double
    BulkInstructorPermission:
      type: object
      description: Bulk update payload for instructor permissions.
      properties:
        instructor_id:
          type: integer
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/BulkPermissionItem'
      required:
      - instructor_id
      - permissions
    BulkLOPOMapping:
      type: object
      description: Bulk sync payload for LO-PO mappings.
      properties:
        course_id:
          type: integer
        creates:
          type: array
          items:
            $ref: '#/components/schemas/BulkLOPOMappingItem'
        updates:
          type: array
          items:
            $ref: '#/components/schemas/BulkLOPOMappingItem'
        deletes:
          type: array
          items:
            type: integer
      required:
      - course_id
    BulkLOPOMappingItem:
      type: object
      description: Single item in a bulk LO-PO sync request.
      properties:
        temp_id:
          type: integer
        id:
          type: integer
        learning_outcome_id:
          type: integer
        program_outcome_id:
          type: integer
        weight:
          type: number
          format: double
    BulkPermissionItem:
      type: object
      description: Single permission item in a bulk permission update request.
      properties:
        resource_area:
          type: string
        permission_tier:
          type: string
      required:
      - permission_tier
      - resource_area
    BulkPermissionUpdateItem:
      type: object
      description: Single permission update item with ID for bulk partial updates.
      properties:
        id:
          type: integer
        permission_tier:
          type: string
        resource_area:
          type: string
      required:
      - id
    CoreLearningOutcome:
      type: object
      description: |-
        Serializer for LearningOutcome model (core app version).

        Renamed to avoid conflicts with evaluation app's LearningOutcomeSerializer.
        Includes nested course details for read operations.

        Fields:
            id: Learning outcome ID
            code: Outcome code (e.g., "LO1")
            description: Detailed description
            course: Nested course object (read-only)
            created_at: Creation timestamp
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 10
        description:
          type: string
        course:
          allOf:
          - $ref: '#/components/schemas/Course'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - course
      - created_at
      - description
      - id
    Course:
      type: object
      description: |-
        Serializer for Course model.

        Handles bidirectional serialization with nested read representation
        and flat write representation.

        Fields:
            id: Course ID
            code: Course code (e.g., "CS101")
            name: Course name
            credits: Credit hours
            program: Nested program object (read-only)
            term: Nested term object (read-only)
            program_id: Program ID for writes (write-only)
            term_id: Term ID for writes (write-only)
            instructors: List of instructor details (read-only)
            created_at: Creation timestamp
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 10
        name:
          type: string
          maxLength: 255
        credits:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        program:
          allOf:
          - $ref: '#/components/schemas/Program'
          readOnly: true
        term:
          allOf:
          - $ref: '#/components/schemas/Term'
          readOnly: true
        program_id:
          type: integer
          writeOnly: true
        term_id:
          type: integer
          writeOnly: true
        instructors:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: |-
            Get instructor details including name and title.

            Args:
                obj: Course instance being serialized

            Returns:
                List of dictionaries containing instructor details:
                    - id: User ID
                    - first_name: Instructor's first name
                    - last_name: Instructor's last name
                    - title: Academic title (if available)
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - id
      - instructors
      - name
      - program
      - program_id
      - term
      - term_id
    CourseEnrollment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        student:
          type: string
          readOnly: true
        course:
          allOf:
          - $ref: '#/components/schemas/Course'
          readOnly: true
        enrolled_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - course
      - enrolled_at
      - id
      - student
    CourseTemplate:
      type: object
      description: |-
        Serializer for CourseTemplate model.

        Provides bidirectional serialization with nested read representation
        and flat write representation for the program FK.
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 10
        name:
          type: string
          maxLength: 255
        credits:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        program:
          allOf:
          - $ref: '#/components/schemas/Program'
          readOnly: true
        program_id:
          type: integer
          writeOnly: true
        instance_count:
          type: integer
          description: Return the number of Courses instantiated from this template.
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - id
      - instance_count
      - name
      - program
      - program_id
      - updated_at
    CourseTemplateAssessmentLOMapping:
      type: object
      description: Serializer for CourseTemplateAssessmentLOMapping.
      properties:
        id:
          type: integer
          readOnly: true
        template_assessment:
          type: integer
        template_learning_outcome:
          type: integer
        weight:
          type: number
          format: double
          maximum: 5
          minimum: 0
          description: 0 to 5
      required:
      - id
