          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        role:
          $ref: '#/components/schemas/RoleEnum'
        department:
          type: string
          readOnly: true
        department_id:
          type: integer
          writeOnly: true
          nullable: true
        university:
          type: string
          readOnly: true
        university_id:
          type: integer
          writeOnly: true
          nullable: true
