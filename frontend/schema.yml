components:
  schemas:
    Assessment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        course:
          type: string
          readOnly: true
        date:
          type: string
          format: date
        total_score:
          type: integer
          maximum: 2147483647
          minimum: 0
        weight:
          type: number
          format: double
          maximum: 1.0
          minimum: 0.0
          description: 0.0 to 1.0
        lo_mappings:
          type: array
          items:
            $ref: '#/components/schemas/AssessmentLearningOutcomeMapping'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - course
      - created_at
      - id
      - lo_mappings
      - name
    AssessmentCreate:
      type: object
      description: For creating/updating assessments
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
