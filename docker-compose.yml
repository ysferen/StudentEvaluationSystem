services:
  db:
    image: postgres:15-alpine
    container_name: ses-postgres
    environment:
      POSTGRES_DB: student_evaluation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ses-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery_worker:
    build: ./backend
    container_name: ses-celery-worker
    command: uv run --no-sync celery --workdir student_evaluation_system -A student_evaluation_system worker --loglevel=info
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/student_evaluation
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
  backend:
    build: ./backend
    container_name: ses-backend
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    command: "uv run --no-sync python student_evaluation_system/manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/student_evaluation
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ses-frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: "npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    env_file:
      - ./frontend/.env.development
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  backend_venv:
  frontend_node_modules:
  redis_data:
